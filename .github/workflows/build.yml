name: Build Multi-Platform Packages

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Briefcase
      run: |
        python -m pip install --upgrade pip
        pip install briefcase

    - name: Build Windows App
      run: briefcase create windows

    - name: Package Windows App
      run: briefcase package windows

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-msi
        path: dist/*.msi

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Briefcase
      run: |
        python -m pip install --upgrade pip
        pip install briefcase

    - name: Build macOS App
      run: briefcase create macOS

    - name: Sign Stub Binary
      run: |
        codesign --sign - --force build/run-trend/macos/app/RunTrend.app/Contents/MacOS/Stub

    - name: Package macOS App
      run: briefcase package macOS --adhoc-sign

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: dist/*.dmg

  create-release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-msi
        path: dist/windows

    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: macos-dmg
        path: dist/macos

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/windows/*.msi
          dist/macos/*.dmg
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
